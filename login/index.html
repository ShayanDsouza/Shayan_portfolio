<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #080808;
    color: #f4f0e8;
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: grid;
    place-items: center;
    overflow: hidden;
  }
  .bg-grid {
    position: fixed; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(255,91,31,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,91,31,.04) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  .card {
    position: relative; z-index: 2;
    width: min(420px, calc(100vw - 32px));
    padding: 48px 40px;
    border: 1px solid rgba(255,255,255,.1);
    background: rgba(15,15,15,.95);
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 48px; height: 48px;
    border-top: 2px solid #ff5b1f;
    border-left: 2px solid #ff5b1f;
  }
  .card::after {
    content: '';
    position: absolute; bottom: 0; right: 0;
    width: 48px; height: 48px;
    border-bottom: 2px solid #ff5b1f;
    border-right: 2px solid #ff5b1f;
  }
  .label {
    font-size: 10px; letter-spacing: .4em; text-transform: uppercase;
    color: #ff5b1f; margin-bottom: 6px;
  }
  h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 36px; font-style: italic;
    color: #f4f0e8; margin-bottom: 36px; line-height: 1;
  }
  .field { margin-bottom: 20px; }
  .field label {
    display: block; font-size: 9px; letter-spacing: .3em;
    text-transform: uppercase; color: #888; margin-bottom: 8px;
  }
  .field input {
    width: 100%; background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.12);
    color: #f4f0e8; font-family: 'JetBrains Mono', monospace;
    font-size: 14px; padding: 12px 14px; outline: none;
    transition: border-color .2s;
  }
  .field input:focus { border-color: #ff5b1f; }
  .field input::placeholder { color: rgba(255,255,255,.2); }
  .error {
    font-size: 10px; color: #e05a3a; letter-spacing: .15em;
    text-transform: uppercase; margin-top: 6px;
    display: none;
  }
  .error.show { display: block; }
  .btn {
    display: block; width: 100%; margin-top: 8px;
    background: #ff5b1f; color: #000; border: none;
    font-family: 'JetBrains Mono', monospace; font-weight: 700;
    font-size: 13px; letter-spacing: .3em; text-transform: uppercase;
    padding: 16px; cursor: pointer; transition: background .2s;
  }
  .btn:hover { background: #ff7a45; }
  .footer-note {
    margin-top: 32px; font-size: 9px; letter-spacing: .15em;
    color: rgba(255,255,255,.2); text-align: center; text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="card">
  <div class="label">◇ Admin Access</div>
  <h1>CMS Login</h1>
  <form id="loginForm" novalidate>
    <div class="field">
      <label>Username</label>
      <input id="username" type="text" placeholder="admin" autocomplete="username" />
    </div>
    <div class="field">
      <label>Password</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
      <div class="error" id="errMsg">✗ Invalid credentials</div>
    </div>
    <button type="submit" class="btn">▶ Enter CMS</button>
  </form>
  <div class="footer-note">Shayan Dsouza · Portfolio Admin</div>
</div>

<script>
  // Redirect if already authed
  if (sessionStorage.getItem('cms_authed') === 'true') {
    window.location.href = '../cms/';
  }

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;
    const storedPass = localStorage.getItem('cms_password') || 'admin';
    const errMsg = document.getElementById('errMsg');

    if (user === 'admin' && pass === storedPass) {
      sessionStorage.setItem('cms_authed', 'true');
      window.location.href = '../cms/';
    } else {
      errMsg.classList.add('show');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  });

  document.getElementById('password').addEventListener('input', function() {
    document.getElementById('errMsg').classList.remove('show');
  });
</script>
</body>
</html>
